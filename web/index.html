<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCP Project Manager</title>
<link rel="stylesheet" href="/static/styles.css"/>
</head>

<body>
<div class="container">

  <h1>🧠 MCP Project Manager</h1>

  <div class="card">
    <h2>Add Project</h2>
    <input id="name" placeholder="Project Name" />
    <input id="path" placeholder="Project Path (/Users/...)" />
    <button class="primary" onclick="addProject()">Add Project</button>
  </div>

  <div class="card">
    <h2>Registered Projects</h2>
    <div id="projects" class="projects-list"></div>
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
